name: Build IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-unsigned:
    name: Build (unsigned, with Widget)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la

      - name: Build archive (no codesign)
        run: |
          set -euxo pipefail
          mkdir -p build
          xcodebuild \
            -project DevicePlayground.xcodeproj \
            -scheme DevicePlayground \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/DevicePlayground.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            archive 2>&1 | tee build/xcodebuild.log
          test -d "$PWD/build/DevicePlayground.xcarchive" || (echo "ARCHIVE NOT FOUND"; tail -200 build/xcodebuild.log; exit 1)

      - name: Package unsigned .ipa
        run: |
          set -euxo pipefail
          APP_PATH="build/DevicePlayground.xcarchive/Products/Applications/DevicePlayground.app"
          test -d "$APP_PATH" || { echo "App bundle not found"; find build -name "*.app" -maxdepth 6 -print; exit 1; }
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry DevicePlayground-unsigned.ipa Payload)
          ls -la build/

      - name: Upload unsigned .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevicePlayground-unsigned-ipa
          path: build/DevicePlayground-unsigned.ipa
          if-no-files-found: error

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-xcodebuild-log
          path: build/xcodebuild.log
          if-no-files-found: ignore

  build-signed:
    name: Build (signed, app only)
    runs-on: macos-15
    timeout-minutes: 25
    # Skip if signing secrets are not configured
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify signing secrets present
        id: have_secrets
        env:
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          PROV_B64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          if [ -n "$P12_B64" ] && [ -n "$PROV_B64" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets not configured; skipping signed build."
          fi

      - name: Strip widget extension from project
        if: steps.have_secrets.outputs.have == 'true'
        run: python3 scripts/strip_widget.py

      - name: Generate Xcode project
        if: steps.have_secrets.outputs.have == 'true'
        run: xcodegen generate

      - name: Import signing assets into temp keychain
        if: steps.have_secrets.outputs.have == 'true'
        env:
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROV_B64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          set -eu
          KC=build.keychain
          KC_PASS=$(uuidgen)
          mkdir -p build
          echo "$P12_B64"  | base64 --decode > build/cert.p12
          echo "$PROV_B64" | base64 --decode > build/profile.mobileprovision

          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 3600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KC"

          security import build/cert.p12 -k "$KC" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild \
            -f pkcs12 -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC" >/dev/null

          # Discover identity name and provisioning details
          IDENTITY_LINE=$(security find-identity -v -p codesigning "$KC" | grep -m1 '"' | head -n1)
          echo "$IDENTITY_LINE"
          IDENTITY_HASH=$(echo "$IDENTITY_LINE" | awk '{print $2}')
          IDENTITY_NAME=$(echo "$IDENTITY_LINE" | sed -n 's/.*"\([^"]*\)".*/\1/p')
          echo "IDENTITY_NAME=$IDENTITY_NAME" >> "$GITHUB_ENV"
          echo "IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

          # Install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID=$(security cms -D -i build/profile.mobileprovision \
            | plutil -extract UUID xml1 -o - - | sed -n 's:.*<string>\(.*\)</string>.*:\1:p')
          PROFILE_BUNDLEID=$(security cms -D -i build/profile.mobileprovision \
            | plutil -extract Entitlements.application-identifier xml1 -o - - \
            | sed -n 's:.*<string>\(.*\)</string>.*:\1:p' | sed 's/^[A-Z0-9]*\.//')
          PROFILE_TEAM=$(security cms -D -i build/profile.mobileprovision \
            | plutil -extract com.apple.developer.team-identifier xml1 -o - - \
            | sed -n 's:.*<string>\(.*\)</string>.*:\1:p' || true)
          # Fallback if the team-identifier extraction fails
          if [ -z "$PROFILE_TEAM" ]; then
            PROFILE_TEAM=$(security cms -D -i build/profile.mobileprovision \
              | plutil -extract TeamIdentifier xml1 -o - - \
              | sed -n 's:.*<string>\(.*\)</string>.*:\1:p' | head -n1)
          fi
          cp build/profile.mobileprovision \
             "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID"           >> "$GITHUB_ENV"
          echo "PROFILE_BUNDLEID=$PROFILE_BUNDLEID"   >> "$GITHUB_ENV"
          echo "PROFILE_TEAM=$PROFILE_TEAM"           >> "$GITHUB_ENV"
          echo "Profile UUID: $PROFILE_UUID, Bundle: $PROFILE_BUNDLEID, Team: $PROFILE_TEAM"

      - name: Align bundle id with provisioning profile
        if: steps.have_secrets.outputs.have == 'true'
        run: |
          # If the user's profile bundle id differs from project default,
          # patch project.yml accordingly before regenerating.
          if [ -n "${PROFILE_BUNDLEID:-}" ]; then
            python3 - <<PY
          import pathlib, re
          p = pathlib.Path("project.yml")
          t = p.read_text()
          t = re.sub(r"PRODUCT_BUNDLE_IDENTIFIER: com\\.FPR\\.de65dbe(?!\\.)",
                     "PRODUCT_BUNDLE_IDENTIFIER: ${PROFILE_BUNDLEID}", t)
          t = re.sub(r'DEVELOPMENT_TEAM: "[^"]*"',
                     'DEVELOPMENT_TEAM: "${PROFILE_TEAM}"', t, count=1)
          p.write_text(t)
          print("aligned to ${PROFILE_BUNDLEID} / ${PROFILE_TEAM}")
          PY
            xcodegen generate
          fi

      - name: Build & sign archive (ad-hoc / development)
        if: steps.have_secrets.outputs.have == 'true'
        run: |
          set -euxo pipefail
          mkdir -p build
          xcodebuild \
            -project DevicePlayground.xcodeproj \
            -scheme DevicePlayground \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/DevicePlayground.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IDENTITY_NAME" \
            DEVELOPMENT_TEAM="$PROFILE_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            ONLY_ACTIVE_ARCH=NO \
            archive 2>&1 | tee build/xcodebuild-signed.log
          test -d "$PWD/build/DevicePlayground.xcarchive" || (echo "ARCHIVE NOT FOUND"; tail -200 build/xcodebuild-signed.log; exit 1)

      - name: Export signed .ipa
        if: steps.have_secrets.outputs.have == 'true'
        run: |
          set -euxo pipefail
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${PROFILE_TEAM}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${PROFILE_BUNDLEID}</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
          # Try ad-hoc first; tolerate failure so we can fall back to development.
          set +e
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/DevicePlayground.xcarchive" \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath "$PWD/build/export" \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" 2>&1 | tee build/xcodebuild-export.log
          set -e

          if [ ! -f "$PWD/build/export/DevicePlayground.ipa" ]; then
            echo "ad-hoc export failed, retrying with method=development"
            sed -i '' 's/<string>ad-hoc<\/string>/<string>development<\/string>/' build/ExportOptions.plist
            xcodebuild -exportArchive \
              -archivePath "$PWD/build/DevicePlayground.xcarchive" \
              -exportOptionsPlist build/ExportOptions.plist \
              -exportPath "$PWD/build/export" \
              OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" 2>&1 | tee -a build/xcodebuild-export.log
          fi
          ls -la build/export/
          test -f "$PWD/build/export/DevicePlayground.ipa"

      - name: Rename signed .ipa
        if: steps.have_secrets.outputs.have == 'true'
        run: |
          mv build/export/DevicePlayground.ipa build/export/DevicePlayground-signed.ipa
          ls -la build/export/

      - name: Upload signed .ipa artifact
        if: steps.have_secrets.outputs.have == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DevicePlayground-signed-ipa
          path: build/export/DevicePlayground-signed.ipa
          if-no-files-found: error

      - name: Upload signed build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: signed-xcodebuild-log
          path: |
            build/xcodebuild-signed.log
            build/xcodebuild-export.log
          if-no-files-found: ignore

      - name: Cleanup keychain & secrets
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f build/cert.p12 build/profile.mobileprovision

  release-attach:
    name: Attach IPAs to release
    needs: [build-unsigned, build-signed]
    if: ${{ !cancelled() && needs.build-unsigned.result == 'success' && github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Attach
        uses: softprops/action-gh-release@v2
        with:
          # softprops/action-gh-release tolerates missing files when fail_on_unmatched_files
          # is false, so the signed .ipa is attached only if the signed job succeeded.
          fail_on_unmatched_files: false
          files: |
            artifacts/DevicePlayground-unsigned-ipa/DevicePlayground-unsigned.ipa
            artifacts/DevicePlayground-signed-ipa/DevicePlayground-signed.ipa
