name: DevicePlayground
options:
  bundleIdPrefix: com.FPR
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: "9XN9K36M5R"
targets:
  DevicePlayground:
    type: application
    platform: iOS
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Device Playground
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
          - location
          - fetch
          - processing
          - remote-notification
          - bluetooth-central
        UIRequiresFullScreen: false
        UIApplicationSupportsIndirectInputEvents: true
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
        CFBundleLocalizations:
          - en
          - ru
        # Permissions / usage descriptions
        NSCameraUsageDescription: "Доступ к камере для фото, видео, QR и OCR / Camera access for photos, video, QR and OCR."
        NSMicrophoneUsageDescription: "Доступ к микрофону для записи аудио / Microphone access for audio recording."
        NSPhotoLibraryUsageDescription: "Доступ к галерее для выбора фото / Photo library access to pick photos."
        NSPhotoLibraryAddUsageDescription: "Сохранение фото в галерею / Save photos to library."
        NSLocationWhenInUseUsageDescription: "Геолокация для тестов GPS и компаса / Location for GPS and compass tests."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Фоновая геолокация и геофенсинг / Background location and geofencing."
        NSLocationAlwaysUsageDescription: "Фоновая геолокация / Background location."
        NSMotionUsageDescription: "Доступ к датчикам движения / Motion sensors access."
        NSHealthShareUsageDescription: "Чтение данных HealthKit / HealthKit read access."
        NSHealthUpdateUsageDescription: "Запись данных HealthKit / HealthKit write access."
        NSFaceIDUsageDescription: "Аутентификация по Face ID / Face ID authentication."
        NSBluetoothAlwaysUsageDescription: "Сканирование BLE устройств / BLE device scanning."
        NSBluetoothPeripheralUsageDescription: "BLE периферия / BLE peripheral."
        NSLocalNetworkUsageDescription: "Локальная сеть и Wi-Fi / Local network and Wi-Fi info."
        NSContactsUsageDescription: "Демонстрация доступа к контактам / Contacts demo."
        NSSiriUsageDescription: "Голосовые команды Siri / Siri voice commands."
        NSUserTrackingUsageDescription: "Демонстрация прозрачности отслеживания / Tracking transparency demo."
        NSAppleMusicUsageDescription: "Воспроизведение из Apple Music / Apple Music playback."
        NSSpeechRecognitionUsageDescription: "Распознавание речи / Speech recognition."
        NSCalendarsUsageDescription: "Демонстрация календаря / Calendar demo."
        NSRemindersUsageDescription: "Демонстрация напоминаний / Reminders demo."
        NFCReaderUsageDescription: "Чтение NFC меток / NFC tag reading."
        NSNearbyInteractionUsageDescription: "Взаимодействие с устройствами поблизости / Nearby interaction."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    sources:
      - path: App
      - path: Shared
    dependencies:
      - target: DevicePlaygroundWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.FPR.de65dbe
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

  DevicePlaygroundWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetExtension
      - path: Shared
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Device Playground Widgets
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.FPR.de65dbe.DevicePlaygroundWidgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WidgetExtension/Info.plist
        SWIFT_VERSION: "5.10"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
